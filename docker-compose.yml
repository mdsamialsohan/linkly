services:
  postgres:
    image: postgres:16-alpine
    container_name: linkly-postgres
    environment:
      POSTGRES_DB: linkly
      POSTGRES_USER: linkly
      POSTGRES_PASSWORD: linkly
    ports:
      - "5432:5432"
    volumes:
      - linkly-pg-data:/var/lib/postgresql/data

volumes:
  linkly-pg-data: